<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MusicRec Auth</title>
    <link rel="stylesheet" href="/css/app.css" />
    <style>
        .auth-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .auth-card {
            padding: 24px;
        }

        .auth-card form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .auth-card h2 {
            margin-top: 0;
        }

        .status-wrap {
            margin-top: 20px;
            padding: 18px;
        }

        @media (max-width: 900px) {
            .auth-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="app-body">
<div class="app-shell" style="max-width: 1100px; padding-top: 60px;">
    <section class="hero-bar">
        <div>
            <div class="hero-pill">MusicRec</div>
            <h1 class="hero-title">Авторизация</h1>
            <p class="hero-subtitle">
                Вход для пользователей и администраторов через email и пароль.
            </p>
        </div>
    </section>

    <div class="auth-grid">
        <section class="glass-card auth-card">
            <h2>Вход</h2>
            <form id="loginForm">
                <input id="loginEmail" class="form-control-dark" placeholder="Email" required />
                <input id="loginPassword" class="form-control-dark" type="password" placeholder="Пароль" required />
                <button type="submit" class="btn-soft">Войти</button>
            </form>
        </section>

        <section class="glass-card auth-card">
            <h2>Регистрация</h2>
            <form id="registerForm">
                <input id="registerDisplayName" class="form-control-dark" placeholder="Имя" required />
                <input id="registerEmail" class="form-control-dark" placeholder="Email" required />
                <input id="registerPassword" class="form-control-dark" type="password" placeholder="Пароль" required />
                <button type="submit" class="btn-soft">Зарегистрироваться</button>
            </form>
        </section>
    </div>

    <section class="glass-card status-wrap">
        <div class="status-label">Статус</div>
        <div id="status" class="status-value">Готово</div>
    </section>
</div>

<script src="/js/auth.js"></script>
</body>
</html>
