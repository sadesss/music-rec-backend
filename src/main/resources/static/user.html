<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MusicRec Player</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6fb;
            color: #1f2937;
        }

        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            font-size: 14px;
        }

        button.secondary {
            background: #6b7280;
        }

        button.negative {
            background: #dc2626;
        }

        .status {
            background: white;
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid #e5e7eb;
            white-space: pre-wrap;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 20px;
        }

        .panel {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 18px;
        }

        .panel h2 {
            margin-top: 0;
            margin-bottom: 14px;
            font-size: 20px;
        }

        .tracks {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-height: 75vh;
            overflow: auto;
            padding-right: 4px;
        }

        .track {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 14px;
            background: #fafbff;
        }

        .track-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .meta {
            font-size: 14px;
            color: #4b5563;
            margin-bottom: 6px;
        }

        .reason {
            margin-top: 8px;
            font-size: 14px;
            color: #374151;
            background: #eef2ff;
            border-radius: 10px;
            padding: 8px 10px;
        }

        audio {
            width: 100%;
            margin-top: 12px;
            margin-bottom: 10px;
        }

        .track-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .empty {
            color: #6b7280;
            padding: 20px 0;
        }

        .welcome {
            font-size: 14px;
            color: #374151;
        }

        @media (max-width: 980px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .tracks {
                max-height: none;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="topbar">
        <div>
            <div class="title">MusicRec Player</div>
            <div class="welcome" id="welcomeText">Загрузка профиля...</div>
        </div>

        <div class="actions">
            <button id="loadTracksBtn">Обновить каталог</button>
            <button id="loadRecoBtn">Обновить рекомендации</button>
            <button id="logoutBtn" class="secondary">Выйти</button>
        </div>
    </div>

    <div id="status" class="status">Готово</div>

    <div class="grid">
        <section class="panel">
            <h2>Каталог треков</h2>
            <div id="catalog" class="tracks">
                <div class="empty">Каталог загружается...</div>
            </div>
        </section>

        <section class="panel">
            <h2>Ваши рекомендации</h2>
            <div id="recommendations" class="tracks">
                <div class="empty">Рекомендации загружаются...</div>
            </div>
        </section>
    </div>
</div>

<script src="/js/user-demo.js"></script>
</body>
</html>
