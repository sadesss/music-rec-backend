
### `/src/main/resources/application.properties`

```properties
server.port=8080

# ---------- Database (PostgreSQL) ----------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:musicrec}
spring.datasource.username=${DB_USER:musicrec}
spring.datasource.password=${DB_PASSWORD:change_me}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

# ---------- Flyway ----------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ---------- JSON / Jackson ----------
spring.jackson.serialization.write-dates-as-timestamps=false

# ---------- Multipart (mp3 upload limits) ----------
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ---------- OpenAPI / Swagger UI ----------
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ---------- App specific ----------
app.storage.audio-dir=./data/audio
app.artifacts.dir=./data/artifacts

# Python offline integration
app.python.executable=${PYTHON_EXECUTABLE:python3}
app.python.scripts-dir=${PYTHON_SCRIPTS_DIR:./python}
app.python.analyze-script=analyze_track.py
app.python.train-script=train_model.py
app.python.timeout-seconds=600

# Security placeholder: admin token
app.security.admin-token-enabled=false
app.security.admin-token=${ADMIN_TOKEN:change_me}

# CORS: comma-separated allowlist; "*" to allow all
app.cors.allowed-origins=*
